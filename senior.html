<!DOCTYPE html>
<html>
<head>
    <title>Senior Assistance Booking</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>Senior Citizen Assisted Booking</header>
    <nav>
        <a href="index.html">Home</a>
        <a href="senior.html">Senior Assistance</a>
    </nav>
    <div class="container">
        <h2>Request Help from Hospital Staff</h2>
        <p>Fill in your name and our staff will complete the booking for you.</p>
        <label for="name">Patient Name:</label>
        <input type="text" id="name" placeholder="Enter your name">
        <label for="phone">Contact Number:</label>
        <input type="tel" id="phone" placeholder="Enter your phone number">
        <button onclick="confirmAppointment()">Request Assistance</button>
    </div>
</body>
</html>
